name: Build Vendor

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist

      - name: Upload vendor
        uses: actions/upload-artifact@v3
        with:
          name: vendor
          path: vendor
